<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top, rgba(99, 102, 241, 0.16), transparent 36%), linear-gradient(180deg, #f8fbff 0%, #eef2ff 100%);
        font-family: system-ui, sans-serif;
        color: #0f172a;
      }

      .login-shell {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .login-card {
        max-width: 420px;
        width: 100%;
        padding: 32px;
        border-radius: 28px;
        background: #ffffff;
        border: 1px solid rgba(148, 163, 184, 0.16);
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.08);
      }

      .form-row { margin-bottom: 18px; }

      .form-label {
        display: block;
        margin-bottom: 10px;
        font-weight: 700;
      }

      .form-input {
        width: 100%;
        border-radius: 16px;
        border: 1px solid rgba(148, 163, 184, 0.24);
        background: #f8fafc;
        padding: 14px 16px;
        font: inherit;
      }

      .login-actions {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      .button {
        padding: 10px 16px;
        border-radius: 12px;
        text-decoration: none;
        border: none;
        cursor: pointer;
      }

      .primary { background: #4f46e5; color: white; }
      .secondary { background: #e2e8f0; color: #0f172a; }
      .muted { color: #64748b; }
    </style>
  </head>

  <body>
    <div class="login-shell">
      <section class="login-card">
        <h1>Admin Login</h1>
        <p>Sign in to manage your CMS.</p>

        <form id="loginForm">
          <div class="form-row">
            <label class="form-label">Password</label>
            <input id="loginPassword" type="password" class="form-input" required />
          </div>

          <div class="login-actions">
            <button type="submit" class="button primary">Sign in</button>
            <a class="button secondary" href="index.html">Back</a>
          </div>

          <p id="loginStatus" class="muted"></p>
        </form>
      </section>
    </div>

    <script>
      const API = "/api";

      document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const password = document.getElementById("loginPassword").value;
        const status = document.getElementById("loginStatus");

        status.textContent = "Logging in...";

        try {
          const res = await fetch(`${API}/login`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },

            // 🔥 IMPORTANT FIX FOR VERCEL COOKIES
            credentials: "include",

            body: JSON.stringify({ password })
          });

          const data = await res.json();

          if (res.ok && data.ok) {
            window.location.href = "/admin.html";
          } else {
            status.textContent = data.error || "Login failed";
          }
        } catch (err) {
          status.textContent = "Server error. Try again.";
        }
      });
    </script>
  </body>
</html>
