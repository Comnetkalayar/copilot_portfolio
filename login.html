<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top, rgba(99, 102, 241, 0.16), transparent 36%), linear-gradient(180deg, #f8fbff 0%, #eef2ff 100%);
        font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #0f172a;
      }

      .login-shell {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .login-card {
        max-width: 420px;
        width: 100%;
        padding: 32px;
        border-radius: 28px;
        background: #ffffff;
        border: 1px solid rgba(148, 163, 184, 0.16);
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.08);
      }

      .login-card h1 {
        margin: 0 0 16px;
        font-size: clamp(1.9rem, 2.4vw, 2.3rem);
      }

      .login-card p {
        margin: 0 0 24px;
        color: #64748b;
        line-height: 1.75;
      }

      .form-row {
        margin-bottom: 18px;
      }

      .form-label {
        display: block;
        margin-bottom: 10px;
        font-size: 0.95rem;
        font-weight: 700;
      }

      .form-input {
        width: 100%;
        border-radius: 16px;
        border: 1px solid rgba(148, 163, 184, 0.24);
        background: #f8fafc;
        padding: 14px 16px;
        font: inherit;
        color: #0f172a;
      }

      .login-note {
        margin-top: 18px;
        color: #64748b;
        font-size: 0.95rem;
      }

      .login-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
    </style>
  </head>
  <body>
    <div class="login-shell">
      <section class="login-card">
        <h1>Admin Login</h1>
        <p>Sign in to manage your portfolio content and update the CMS safely.</p>

        <form id="loginForm">
          <div class="form-row">
            <label class="form-label" for="loginPassword">Password</label>
            <input id="loginPassword" type="password" class="form-input" placeholder="Enter your password" required />
          </div>

          <div class="login-actions">
            <button type="submit" class="button primary">Sign in</button>
            <a class="button secondary" href="index.html">Back to site</a>
          </div>

          <p id="loginStatus" class="muted"></p>
          <p class="login-note">Default password: <strong>admin123</strong>. Change it after you log in.</p>
        </form>
      </section>
    </div>

    <script>
      document.getElementById('loginForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        const password = document.getElementById('loginPassword').value.trim();
        const status = document.getElementById('loginStatus');

        status.textContent = '';
        status.style.color = '#374151';

        try {
          const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password })
          });

          const json = await res.json();
          if (res.ok && json.ok) {
            window.location.href = '/admin.html';
            return;
          }

          status.textContent = json.error || 'Login failed. Please try again.';
          status.style.color = '#b91c1c';
        } catch (err) {
          status.textContent = 'Unable to connect to the server.';
          status.style.color = '#b91c1c';
        }
      });
    </script>
  </body>
</html>
